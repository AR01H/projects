<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Title & meta populated from JSON -->
  <title>Why You Need a Buyer's Agent | Advaith Homes</title>
  <meta name="description" content="Discover why buying a UK home without professional support can cost you thousands. Advaith Homes works exclusively for buyers — not sellers." />
  <link rel="canonical" href="https://advaithhomes.co.uk/why-us" />
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/commonstandard.css" />
  <style>
    /* ── Page Layout ─────────────────────────── */
    .why-page { max-width: 900px; margin: 0 auto; padding: 0 24px 80px; }

    /* Hero */
    .why-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 60%, #312e81 100%);
      color: white; text-align: center;
      padding: 80px 24px 60px;
      margin-bottom: 0;
    }
    .why-hero .eyebrow { color: var(--accent-light, #c4b5fd); border-color: rgba(196,181,253,0.3); margin-bottom: 16px; }
    .why-hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
    .why-hero p  { font-size: 1.05rem; color: rgba(255,255,255,0.8); max-width: 680px; margin: 0 auto; line-height: 1.8; }

    /* Intro stat strip */
    .why-stats {
      display: grid; grid-template-columns: repeat(3, 1fr);
      background: white; border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .why-stat { padding: 28px 20px; text-align: center; border-right: 1px solid var(--border); }
    .why-stat:last-child { border-right: none; }
    .why-stat__num { font-size: 2rem; font-weight: 800; color: var(--accent); display: block; }
    .why-stat__label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    @media(max-width:600px){ .why-stats { grid-template-columns: 1fr; } .why-stat { border-right: none; border-bottom: 1px solid var(--border); } }

    /* Section headers */
    .why-section { padding: 56px 0 0; }
    .why-section__tag {
      display: inline-block; font-size: 0.65rem; font-weight: 800; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); border: 1px solid rgba(109,40,217,0.3);
      background: rgba(109,40,217,0.07); padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
    }
    .why-section__title { font-size: clamp(1.3rem, 3vw, 1.75rem); font-weight: 800; color: var(--slate-900); margin-bottom: 32px; }

    /* Challenge timeline cards */
    .challenge-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    @media(max-width:640px){ .challenge-grid { grid-template-columns: 1fr; } }

    .challenge-card {
      background: white; border: 1px solid var(--border); border-radius: 16px;
      padding: 24px; transition: box-shadow .2s, transform .2s;
    }
    .challenge-card:hover { box-shadow: 0 8px 32px rgba(109,40,217,0.1); transform: translateY(-2px); }
    .challenge-card__header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .challenge-card__icon { font-size: 1.5rem; width: 44px; height: 44px; display: grid; place-items: center;
      background: rgba(109,40,217,0.08); border-radius: 10px; flex-shrink: 0; }
    .challenge-card__phase { font-size: 0.78rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; }
    .challenge-card ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
    .challenge-card li {
      font-size: 0.86rem; color: var(--slate-700); padding-left: 20px;
      position: relative; line-height: 1.5;
    }
    .challenge-card li::before { content: '→'; position: absolute; left: 0; color: var(--accent); font-size: 0.75rem; top: 1px; }

    /* Do / Don't comparison */
    .do-dont { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width:640px){ .do-dont { grid-template-columns: 1fr; } }

    .do-card, .dont-card {
      border-radius: 16px; padding: 28px;
    }
    .do-card   { background: rgba(16,185,129,0.06); border: 1px solid rgba(16,185,129,0.25); }
    .dont-card { background: rgba(239,68,68,0.05);  border: 1px solid rgba(239,68,68,0.18); }

    .do-card h3   { color: #065f46; font-size: 1rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .dont-card h3 { color: #991b1b; font-size: 1rem; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

    .do-card ul, .dont-card ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
    .do-card li, .dont-card li { font-size: 0.86rem; line-height: 1.55; padding-left: 22px; position: relative; }
    .do-card li::before   { content: '✓'; position: absolute; left: 0; color: #059669; font-weight: 800; }
    .dont-card li::before { content: '✕'; position: absolute; left: 0; color: #dc2626; font-weight: 700; }

    /* Common questions accordion */
    .questions-list { display: flex; flex-direction: column; gap: 10px; }
    .question-item {
      background: white; border: 1px solid var(--border); border-radius: 12px;
      overflow: hidden; cursor: pointer; transition: box-shadow .2s;
    }
    .question-item:hover { box-shadow: 0 4px 16px rgba(109,40,217,0.1); }
    .question-item.open { border-color: rgba(109,40,217,0.35); }
    .question-q {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; font-size: 0.9rem; font-weight: 600; color: var(--slate-800);
      gap: 16px;
    }
    .question-q svg { flex-shrink: 0; transition: transform .25s; color: var(--accent); }
    .question-item.open .question-q svg { transform: rotate(180deg); }
    .question-a {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease, padding .25s;
      font-size: 0.87rem; color: var(--text-muted); line-height: 1.7;
      padding: 0 22px;
    }
    .question-item.open .question-a { max-height: 200px; padding: 0 22px 18px; }

    /* CTA box */
    .why-cta-box {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      border-radius: 24px; padding: 52px 40px; text-align: center; margin-top: 56px; color: white;
    }
    .why-cta-box h2 { font-size: clamp(1.4rem, 3vw, 2rem); font-weight: 800; margin-bottom: 12px; }
    .why-cta-box p  { color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-bottom: 28px; max-width: 520px; margin-left: auto; margin-right: auto; }
    .why-cta-box .btn-gold { display: inline-flex; align-items: center; gap: 8px; font-size: 0.95rem; padding: 16px 36px; border-radius: 50px; }
    @media(max-width:480px){ .why-cta-box { padding: 36px 20px; } }

    /* Back link */
    .why-back { display: inline-flex; align-items: center; gap: 8px; color: var(--accent);
      text-decoration: none; font-size: 0.85rem; font-weight: 600; margin-bottom: 0;
      transition: gap .2s; }
    .why-back:hover { gap: 14px; }
    .why-hero-wrap { position: relative; }
    .why-hero-back { position: absolute; top: 24px; left: 24px; }
    .why-hero-back a { color: rgba(255,255,255,0.7); font-size: 0.8rem; text-decoration: none; display: flex; align-items: center; gap: 6px; }
    .why-hero-back a:hover { color: white; }
  </style>
</head>
<body data-page="why-us">
  <div id="nav-placeholder"></div>

  <!-- Page built dynamically from data/why-us.json -->
  <div id="page-root"></div>

  <div id="footer-placeholder"></div>
  <script src="../js/components.js"></script>
  <!-- Load data from JS file — no CORS issues locally -->
  <script src="../data/why-us.js"></script>
  <script>
    (function() {
      const d = WHY_US_DATA;
      if (!d) return;
      const page = d.page;

      // Update <title> & meta
      document.title = page.title;
      document.querySelector('meta[name="description"]').content = page.metaDescription;

      // Build page HTML
      const root = document.getElementById('page-root');
      root.innerHTML = `
        <div class="why-hero-wrap">
          <div class="why-hero">
            <div class="why-hero-back"><a href="../index.html">← Back to Home</a></div>
            <div class="eyebrow">${page.hero.eyebrow}</div>
            <h1>${page.hero.headline}</h1>
            <p>${page.hero.subtext}</p>
          </div>
        </div>
        <div class="why-stats">
          <div class="why-stat"><span class="why-stat__num">£18k+</span><span class="why-stat__label">Average saving per client</span></div>
          <div class="why-stat"><span class="why-stat__num">100%</span><span class="why-stat__label">Working exclusively for buyers</span></div>
          <div class="why-stat"><span class="why-stat__num">6–18mo</span><span class="why-stat__label">Typical search time we reduce</span></div>
        </div>
        <div class="why-page">
          <div class="why-section">
            <span class="why-section__tag">Common Buyer Challenges</span>
            <h2 class="why-section__title">What Buyers Face Without Professional Help</h2>
            <div class="challenge-grid" id="challenge-grid"></div>
          </div>
          <div class="why-section">
            <span class="why-section__tag">Our Commitment</span>
            <h2 class="why-section__title">What We Do — and What We Don't</h2>
            <div class="do-dont">
              <div class="do-card"><h3>✅ What We Do</h3><ul id="do-list"></ul></div>
              <div class="dont-card"><h3>❌ What We Don't Do</h3><ul id="dont-list"></ul></div>
            </div>
          </div>
          <div class="why-section">
            <span class="why-section__tag">Buyer Concerns</span>
            <h2 class="why-section__title">Questions Every Buyer Asks Themselves</h2>
            <div class="questions-list" id="questions-list"></div>
          </div>
          <div class="why-cta-box">
            <h2>${page.cta.headline}</h2>
            <p>${page.cta.subtext}</p>
            <a href="${page.cta.buttonUrl}" class="btn btn-gold">${page.cta.buttonText}</a>
          </div>
        </div>`;

      // Challenges
      const cgrid = document.getElementById('challenge-grid');
      page.challenges.forEach(function(ch) {
        cgrid.innerHTML += '<div class="challenge-card">'
          + '<div class="challenge-card__header">'
          + '<div class="challenge-card__icon">' + ch.icon + '</div>'
          + '<div class="challenge-card__phase">' + ch.phase + '</div></div>'
          + '<ul>' + ch.items.map(function(i){ return '<li>' + i + '</li>'; }).join('') + '</ul>'
          + '</div>';
      });

      // Do / Don't
      document.getElementById('do-list').innerHTML   = page.whatWeDo.do.map(function(i){ return '<li>' + i + '</li>'; }).join('');
      document.getElementById('dont-list').innerHTML = page.whatWeDo.dont.map(function(i){ return '<li>' + i + '</li>'; }).join('');

      // Questions accordion
      const qlist = document.getElementById('questions-list');
      page.commonQuestions.forEach(function(item, i) {
        qlist.innerHTML += '<div class="question-item" id="qi-' + i + '">'
          + '<div class="question-q" onclick="toggleQ(\'qi-' + i + '\')">'
          + '<span>' + item.q + '</span>'
          + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>'
          + '</div><div class="question-a">' + item.a + '</div></div>';
      });
    })();

    function toggleQ(id) {
      var item = document.getElementById(id);
      var isOpen = item.classList.contains('open');
      document.querySelectorAll('.question-item').forEach(function(i){ i.classList.remove('open'); });
      if (!isOpen) item.classList.add('open');
    }
  </script>
</body>
</html>
