<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mortgage Calculator | Advaith Homes</title><style>*{box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;max-width:760px;margin:40px auto;padding:0 24px;color:#1e293b;line-height:1.7}h1{font-size:1.75rem;font-weight:800;margin-bottom:6px}h2{font-size:1.1rem;font-weight:700;margin:26px 0 8px;color:#0f172a}p.sub{color:#64748b;margin:0 0 24px}.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}label{display:block;font-weight:600;font-size:.875rem;margin-bottom:6px;color:#374151}input[type=number],select{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:1rem;margin-bottom:18px;font-family:inherit}input:focus,select:focus{border-color:#b7791f;outline:none;box-shadow:0 0 0 3px rgba(183,121,31,.12)}.btn{width:100%;background:#b7791f;color:#fff;border:none;padding:13px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}.btn:hover{background:#7c4a08}.res{background:linear-gradient(135deg,#b7791f,#7c4a08);color:#fff;border-radius:12px;padding:22px;margin-top:16px;display:none}.amt{font-size:2rem;font-weight:800;margin:4px 0}.brk{font-size:.875rem;opacity:.9;margin-top:10px;line-height:1.9}.badge{display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:20px;padding:3px 12px;font-size:.75rem;font-weight:700;margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:.875rem}th,td{padding:9px 14px;border-bottom:1px solid #f1f5f9;text-align:left}th{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8}tr:last-child td{border:none}.ci{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}.ci input[type=checkbox]{width:16px;height:16px;flex-shrink:0;accent-color:#b7791f;cursor:pointer;margin-top:2px}.ci label{font-size:.9rem;cursor:pointer;color:#374151}dt{font-weight:700;color:#0f172a;margin-top:18px}dd{color:#64748b;margin:4px 0 0 12px;padding-left:12px;border-left:3px solid #fde68a;font-size:.875rem}.sec{background:#f8fafc;border-radius:8px;padding:16px 20px;margin:12px 0}.sec p{color:#374151;margin:4px 0 0}@media(max-width:600px){h1{font-size:1.35rem}.amt{font-size:1.6rem}}</style></head><body><span class="badge">Free Calculator</span><h1>Mortgage Repayment Calculator</h1><p class="sub">Estimate monthly payments and total interest cost. For personalised advice, speak with a qualified mortgage broker.</p><div class="card"><label for="ml">Loan amount (&pound;)</label><input type="number" id="ml" placeholder="e.g. 300000" min="0" step="5000"><label for="mr">Annual interest rate (%)</label><input type="number" id="mr" placeholder="e.g. 4.5" min="0" max="30" step="0.1"><label for="mt">Mortgage term (years)</label><input type="number" id="mt" placeholder="e.g. 25" min="1" max="40" step="1"><button class="btn" onclick="mcalc()">Calculate</button><div class="res" id="mr2"><p style="opacity:.8;font-size:.875rem;margin:0">Monthly repayment</p><div class="amt" id="ma"></div><div class="brk" id="mb"></div></div></div><script>function mf(n){return"£"+Math.round(n).toLocaleString("en-GB")}function mcalc(){var L=parseFloat(document.getElementById("ml").value)||0,R=parseFloat(document.getElementById("mr").value)||0,Y=parseFloat(document.getElementById("mt").value)||0;if(!L||!R||!Y){alert("Please fill in all three fields");return}var r=R/100/12,n=Y*12,pmt=r?L*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1):L/n,tot=pmt*n,ti=tot-L;document.getElementById("ma").textContent=mf(pmt)+" / month";document.getElementById("mb").innerHTML="Total repaid: "+mf(tot)+"<br>Total interest: "+mf(ti)+"<br>Loan (capital): "+mf(L);document.getElementById("mr2").style.display="block"}</script></body></html>
