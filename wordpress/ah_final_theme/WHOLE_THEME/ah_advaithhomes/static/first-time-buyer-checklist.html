<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>First-Time Buyer Checklist | Advaith Homes</title><style>*{box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;max-width:760px;margin:40px auto;padding:0 24px;color:#1e293b;line-height:1.7}h1{font-size:1.75rem;font-weight:800;margin-bottom:6px}h2{font-size:1.1rem;font-weight:700;margin:26px 0 8px;color:#0f172a}p.sub{color:#64748b;margin:0 0 24px}.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}label{display:block;font-weight:600;font-size:.875rem;margin-bottom:6px;color:#374151}input[type=number],select{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:1rem;margin-bottom:18px;font-family:inherit}input:focus,select:focus{border-color:#b7791f;outline:none;box-shadow:0 0 0 3px rgba(183,121,31,.12)}.btn{width:100%;background:#b7791f;color:#fff;border:none;padding:13px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}.btn:hover{background:#7c4a08}.res{background:linear-gradient(135deg,#b7791f,#7c4a08);color:#fff;border-radius:12px;padding:22px;margin-top:16px;display:none}.amt{font-size:2rem;font-weight:800;margin:4px 0}.brk{font-size:.875rem;opacity:.9;margin-top:10px;line-height:1.9}.badge{display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:20px;padding:3px 12px;font-size:.75rem;font-weight:700;margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:.875rem}th,td{padding:9px 14px;border-bottom:1px solid #f1f5f9;text-align:left}th{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8}tr:last-child td{border:none}.ci{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}.ci input[type=checkbox]{width:16px;height:16px;flex-shrink:0;accent-color:#b7791f;cursor:pointer;margin-top:2px}.ci label{font-size:.9rem;cursor:pointer;color:#374151}dt{font-weight:700;color:#0f172a;margin-top:18px}dd{color:#64748b;margin:4px 0 0 12px;padding-left:12px;border-left:3px solid #fde68a;font-size:.875rem}.sec{background:#f8fafc;border-radius:8px;padding:16px 20px;margin:12px 0}.sec p{color:#374151;margin:4px 0 0}@media(max-width:600px){h1{font-size:1.35rem}.amt{font-size:1.6rem}}</style></head><body><span class="badge">Free Guide</span><h1>First-Time Buyer Checklist</h1><p class="sub">Work through each step in order. Tick items off as you complete them.</p><div class="card"><h2>1. Finances</h2><div class="ci"><input type="checkbox" id="c1"><label for="c1">Check your credit report free via Experian, Equifax, or Credit Karma</label></div><div class="ci"><input type="checkbox" id="c2"><label for="c2">Calculate your total budget: deposit + stamp duty + legal fees + survey costs</label></div><div class="ci"><input type="checkbox" id="c3"><label for="c3">Get an Agreement in Principle (AIP) from a lender or mortgage broker</label></div><div class="ci"><input type="checkbox" id="c4"><label for="c4">Check eligibility for a Lifetime ISA (25% government bonus on savings up to &pound;4,000/year)</label></div><div class="ci"><input type="checkbox" id="c5"><label for="c5">Confirm stamp duty position — no SDLT on first &pound;425k for properties up to &pound;625k</label></div></div><div class="card"><h2>2. Search and View</h2><div class="ci"><input type="checkbox" id="c6"><label for="c6">Register with local estate agents and set up Rightmove / Zoopla alerts</label></div><div class="ci"><input type="checkbox" id="c7"><label for="c7">View at least 5 to 8 properties before making an offer</label></div><div class="ci"><input type="checkbox" id="c8"><label for="c8">Research recent sold prices in target area via Land Registry data</label></div><div class="ci"><input type="checkbox" id="c9"><label for="c9">Ask the vendor why they are selling and how long the property has been listed</label></div></div><div class="card"><h2>3. Offer and Legal</h2><div class="ci"><input type="checkbox" id="c10"><label for="c10">Submit your offer in writing via the estate agent</label></div><div class="ci"><input type="checkbox" id="c11"><label for="c11">Instruct a solicitor or licensed conveyancer immediately after offer acceptance</label></div><div class="ci"><input type="checkbox" id="c12"><label for="c12">Submit full mortgage application within 2 to 3 weeks of offer acceptance</label></div><div class="ci"><input type="checkbox" id="c13"><label for="c13">Book a RICS HomeBuyer Report or full Building Survey</label></div><div class="ci"><input type="checkbox" id="c14"><label for="c14">Review results of local authority, water, and environmental searches</label></div></div><div class="card"><h2>4. Exchange and Completion</h2><div class="ci"><input type="checkbox" id="c15"><label for="c15">Pay exchange deposit (typically 10% of purchase price)</label></div><div class="ci"><input type="checkbox" id="c16"><label for="c16">Agree a completion date with the vendor</label></div><div class="ci"><input type="checkbox" id="c17"><label for="c17">Arrange buildings insurance to begin from date of exchange</label></div><div class="ci"><input type="checkbox" id="c18"><label for="c18">Transfer remaining balance to solicitor and collect your keys!</label></div></div></body></html>
