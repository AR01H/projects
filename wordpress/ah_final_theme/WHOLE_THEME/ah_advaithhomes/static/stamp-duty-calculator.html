<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stamp Duty Calculator | Advaith Homes</title><style>*{box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;max-width:760px;margin:40px auto;padding:0 24px;color:#1e293b;line-height:1.7}h1{font-size:1.75rem;font-weight:800;margin-bottom:6px}h2{font-size:1.1rem;font-weight:700;margin:26px 0 8px;color:#0f172a}p.sub{color:#64748b;margin:0 0 24px}.card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.05)}label{display:block;font-weight:600;font-size:.875rem;margin-bottom:6px;color:#374151}input[type=number],select{width:100%;padding:10px 14px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:1rem;margin-bottom:18px;font-family:inherit}input:focus,select:focus{border-color:#b7791f;outline:none;box-shadow:0 0 0 3px rgba(183,121,31,.12)}.btn{width:100%;background:#b7791f;color:#fff;border:none;padding:13px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit}.btn:hover{background:#7c4a08}.res{background:linear-gradient(135deg,#b7791f,#7c4a08);color:#fff;border-radius:12px;padding:22px;margin-top:16px;display:none}.amt{font-size:2rem;font-weight:800;margin:4px 0}.brk{font-size:.875rem;opacity:.9;margin-top:10px;line-height:1.9}.badge{display:inline-block;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:20px;padding:3px 12px;font-size:.75rem;font-weight:700;margin-bottom:20px}table{width:100%;border-collapse:collapse;font-size:.875rem}th,td{padding:9px 14px;border-bottom:1px solid #f1f5f9;text-align:left}th{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8}tr:last-child td{border:none}.ci{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:1px solid #f1f5f9}.ci input[type=checkbox]{width:16px;height:16px;flex-shrink:0;accent-color:#b7791f;cursor:pointer;margin-top:2px}.ci label{font-size:.9rem;cursor:pointer;color:#374151}dt{font-weight:700;color:#0f172a;margin-top:18px}dd{color:#64748b;margin:4px 0 0 12px;padding-left:12px;border-left:3px solid #fde68a;font-size:.875rem}.sec{background:#f8fafc;border-radius:8px;padding:16px 20px;margin:12px 0}.sec p{color:#374151;margin:4px 0 0}@media(max-width:600px){h1{font-size:1.35rem}.amt{font-size:1.6rem}}</style></head><body><span class="badge">Free Calculator</span><h1>Stamp Duty Calculator 2025</h1><p class="sub">Calculate your Stamp Duty Land Tax (SDLT) instantly. Updated for 2025 thresholds — covers standard purchases, first-time buyers, and additional properties.</p><div class="card"><label for="sp">Property price (&pound;)</label><input type="number" id="sp" placeholder="e.g. 450000" min="0" step="1000"><label for="st">Buyer type</label><select id="st"><option value="std">Standard buyer (main home)</option><option value="ftb">First-time buyer</option><option value="btl">Additional property / Buy-to-let</option></select><button class="btn" onclick="sdlt()">Calculate Stamp Duty</button><div class="res" id="sr"><p style="opacity:.8;font-size:.875rem;margin:0">Your SDLT liability</p><div class="amt" id="sa"></div><div class="brk" id="sb"></div></div></div><script>function sf(n){return"£"+Math.round(n).toLocaleString("en-GB")}function sdlt(){var p=parseFloat(document.getElementById("sp").value)||0,t=document.getElementById("st").value,x=0,ls=[];if(t==="ftb"&&p<=425e3){ls=["No SDLT — first-time buyer relief applies (up to £425,000)"]}else if(t==="ftb"&&p<=625e3){x=(p-425e3)*.05;ls=["5% on "+sf(p-425e3)+" above £425k limit = "+sf(x)]}else{var bs=t==="btl"?[[25e4,.05],[925e3,.1],[15e5,.15],[1e18,.17]]:[[25e4,0],[925e3,.05],[15e5,.1],[1e18,.12]],pr=0;bs.forEach(function(b){if(p>pr){var c=Math.min(p,b[0])-pr,v=c*b[1];x+=v;if(v>0)ls.push(b[1]*100+"% on "+sf(c)+" = "+sf(v));pr=b[0]}})}if(t==="btl")ls.unshift("3% surcharge applies (additional / BTL property)");document.getElementById("sa").textContent=sf(x);document.getElementById("sb").innerHTML=ls.join("<br>")||"No stamp duty payable";document.getElementById("sr").style.display="block"}</script></body></html>
