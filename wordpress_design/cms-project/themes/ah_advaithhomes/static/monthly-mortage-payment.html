<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Mortgage Payment</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0f1e;
    --card: #111827;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: #1e293b;
    --green: #10b981;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 40px; max-width: 520px; width: 100%; }
  h1 { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 6px; }
  .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
  .field { margin-bottom: 24px; }
  label { font-size: 13px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 8px; }
  label span { color: var(--accent2); font-weight: 500; font-size: 14px; }
  input[type=range] { width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px; background: var(--border); outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent); border: 3px solid var(--bg); cursor: pointer; transition: transform 0.2s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  .track-fill { position: relative; }
  .result { background: linear-gradient(135deg, #1e3a5f, #1e293b); border: 1px solid var(--accent); border-radius: 14px; padding: 24px; text-align: center; margin-top: 28px; }
  .result-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .result-value { font-family: 'Playfair Display', serif; font-size: 48px; color: var(--accent2); }
  .result-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
  .bitem { background: var(--bg); border-radius: 10px; padding: 12px; text-align: center; }
  .bitem-label { font-size: 11px; color: var(--muted); }
  .bitem-value { font-size: 16px; font-weight: 500; color: var(--green); margin-top: 2px; }
  .flag { font-size: 11px; background: #1e3a5f; color: var(--accent2); padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="flag">🇬🇧 UK Mortgage</div>
  <h1>Monthly Payment</h1>
  <p class="subtitle">Drag the sliders to calculate your monthly repayment</p>

  <div class="field">
    <label>Property Price <span id="price-val">£250,000</span></label>
    <input type="range" id="price" min="50000" max="2000000" step="5000" value="250000" oninput="calc()">
  </div>
  <div class="field">
    <label>Deposit <span id="dep-val">£50,000 (20%)</span></label>
    <input type="range" id="deposit" min="5" max="50" step="1" value="20" oninput="calc()">
  </div>
  <div class="field">
    <label>Interest Rate <span id="rate-val">4.5%</span></label>
    <input type="range" id="rate" min="1" max="12" step="0.1" value="4.5" oninput="calc()">
  </div>
  <div class="field">
    <label>Mortgage Term <span id="term-val">25 years</span></label>
    <input type="range" id="term" min="5" max="35" step="1" value="25" oninput="calc()">
  </div>

  <div class="result">
    <div class="result-label">Monthly Payment</div>
    <div class="result-value" id="monthly">£0</div>
    <div class="result-sub">Capital & Interest Repayment</div>
    <div class="breakdown">
      <div class="bitem"><div class="bitem-label">Loan Amount</div><div class="bitem-value" id="loan">£0</div></div>
      <div class="bitem"><div class="bitem-label">Total Repaid</div><div class="bitem-value" id="total">£0</div></div>
      <div class="bitem"><div class="bitem-label">Total Interest</div><div class="bitem-value" id="interest">£0</div></div>
      <div class="bitem"><div class="bitem-label">LTV Ratio</div><div class="bitem-value" id="ltv">0%</div></div>
    </div>
  </div>
</div>
<script>
function fmt(n){return'£'+Math.round(n).toLocaleString('en-GB');}
function calc(){
  const price=+document.getElementById('price').value;
  const depPct=+document.getElementById('deposit').value;
  const rate=+document.getElementById('rate').value;
  const term=+document.getElementById('term').value;
  const dep=price*(depPct/100);
  const loan=price-dep;
  const r=rate/100/12;
  const n=term*12;
  const monthly=loan*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);
  const total=monthly*n;
  document.getElementById('price-val').textContent=fmt(price);
  document.getElementById('dep-val').textContent=fmt(dep)+' ('+depPct+'%)';
  document.getElementById('rate-val').textContent=rate.toFixed(1)+'%';
  document.getElementById('term-val').textContent=term+' years';
  document.getElementById('monthly').textContent=fmt(monthly);
  document.getElementById('loan').textContent=fmt(loan);
  document.getElementById('total').textContent=fmt(total);
  document.getElementById('interest').textContent=fmt(total-loan);
  document.getElementById('ltv').textContent=(100-depPct)+'%';
}
calc();
</script>
</body>
</html>
