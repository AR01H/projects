<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" preserveAspectRatio="xMidYMid slice" width="2000" height="600">
  <style>
    @keyframes float1 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-22px)} }
    @keyframes float2 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-16px)} }
    @keyframes float3 { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-28px)} }
    @keyframes spin1  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes spin2  { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
    @keyframes pulse1 { 0%{transform:scale(1);opacity:0.5} 100%{transform:scale(2.8);opacity:0} }
    @keyframes pulse2 { 0%{transform:scale(1);opacity:0.4} 100%{transform:scale(2.4);opacity:0} }
    @keyframes drift1 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(20px)} }
    @keyframes drift2 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-18px)} }
    @keyframes dash   { to{stroke-dashoffset:-40} }

    .f1{animation:float1 5s ease-in-out infinite}
    .f2{animation:float2 7s ease-in-out infinite}
    .f3{animation:float3 6s ease-in-out infinite}
    .f4{animation:float1 8.5s ease-in-out infinite}
    .f5{animation:float2 4.5s ease-in-out infinite}
    .f6{animation:float3 9s ease-in-out infinite}

    .s1{transform-box:fill-box;transform-origin:center;animation:spin1 10s linear infinite}
    .s2{transform-box:fill-box;transform-origin:center;animation:spin2 14s linear infinite}
    .s3{transform-box:fill-box;transform-origin:center;animation:spin1 18s linear infinite}
    .s4{transform-box:fill-box;transform-origin:center;animation:spin2 8s linear infinite}

    .p1{transform-box:fill-box;transform-origin:center;animation:pulse1 3s ease-out infinite}
    .p2{transform-box:fill-box;transform-origin:center;animation:pulse2 3s ease-out infinite 1.5s}
    .p3{transform-box:fill-box;transform-origin:center;animation:pulse1 4s ease-out infinite 0.8s}
    .p4{transform-box:fill-box;transform-origin:center;animation:pulse2 3.5s ease-out infinite 2s}

    .d1{animation:drift1 6s ease-in-out infinite}
    .d2{animation:drift2 8s ease-in-out infinite}
    .d3{animation:drift1 11s ease-in-out infinite}

    .dk{stroke-dasharray:8 6;animation:dash 2s linear infinite}
    .dk2{stroke-dasharray:5 8;animation:dash 3s linear infinite reverse}
  </style>

  <!-- big hollow circles (pulse rings) -->
  <circle class="p1" cx="120"  cy="90"  r="36" fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="2.5"/>
  <circle class="p2" cx="120"  cy="90"  r="36" fill="none" stroke="rgba(0,0,0,0.14)" stroke-width="1.5"/>
  <circle class="p3" cx="1280" cy="480" r="40" fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="2.5"/>
  <circle class="p4" cx="700"  cy="300" r="28" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="2"/>

  <!-- floating solid circles -->
  <circle class="f1" cx="80"   cy="160" r="13" fill="rgba(0,0,0,0.22)"/>
  <circle class="f2" cx="1320" cy="100" r="9"  fill="rgba(0,0,0,0.20)"/>
  <circle class="f3" cx="650"  cy="520" r="11" fill="rgba(0,0,0,0.18)"/>
  <circle class="f4" cx="220"  cy="430" r="7"  fill="rgba(0,0,0,0.16)"/>
  <circle class="f5" cx="1100" cy="200" r="15" fill="rgba(0,0,0,0.20)"/>
  <circle class="f6" cx="400"  cy="60"  r="8"  fill="rgba(0,0,0,0.18)"/>
  <circle class="f2" cx="950"  cy="490" r="10" fill="rgba(0,0,0,0.15)"/>
  <circle class="f1" cx="1200" cy="330" r="6"  fill="rgba(0,0,0,0.18)"/>

  <!-- spinning squares (rotated = diamonds) -->
  <rect class="s1" x="46"   y="260" width="28" height="28" rx="3" fill="none" stroke="rgba(0,0,0,0.30)" stroke-width="2.5" transform="rotate(45,60,274)"/>
  <rect class="s2" x="1246" y="50"  width="34" height="34" rx="3" fill="none" stroke="rgba(0,0,0,0.28)" stroke-width="2.5" transform="rotate(45,1263,67)"/>
  <rect class="s3" x="546"  y="36"  width="22" height="22" rx="2" fill="none" stroke="rgba(0,0,0,0.24)" stroke-width="2"   transform="rotate(45,557,47)"/>
  <rect class="s4" x="346"  y="516" width="26" height="26" rx="2" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="2"   transform="rotate(45,359,529)"/>
  <rect class="s1" x="1046" cy="380" width="20" height="20" rx="2" fill="rgba(0,0,0,0.18)" stroke="none" transform="rotate(45,1056,390)"/>
  <!-- filled spinning diamonds -->
  <polygon class="s2" points="820,40 838,58 820,76 802,58" fill="rgba(0,0,0,0.20)"/>
  <polygon class="s4" points="160,530 174,544 160,558 146,544" fill="rgba(0,0,0,0.18)"/>
  <polygon class="s1" points="1350,250 1366,266 1350,282 1334,266" fill="rgba(0,0,0,0.16)"/>

  <!-- drifting plus signs -->
  <g class="d1">
    <line x1="700" y1="130" x2="726" y2="130" stroke="rgba(0,0,0,0.22)" stroke-width="3" stroke-linecap="round"/>
    <line x1="713" y1="117" x2="713" y2="143" stroke="rgba(0,0,0,0.22)" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g class="d2">
    <line x1="200" y1="80"  x2="220" y2="80"  stroke="rgba(0,0,0,0.28)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="210" y1="70"  x2="210" y2="90"  stroke="rgba(0,0,0,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g class="d3">
    <line x1="1160" y1="420" x2="1184" y2="420" stroke="rgba(0,0,0,0.26)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="1172" y1="408" x2="1172" y2="432" stroke="rgba(0,0,0,0.26)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g class="d1">
    <line x1="460" y1="490" x2="480" y2="490" stroke="rgba(0,0,0,0.24)" stroke-width="2"   stroke-linecap="round"/>
    <line x1="470" y1="480" x2="470" y2="500" stroke="rgba(0,0,0,0.24)" stroke-width="2"   stroke-linecap="round"/>
  </g>

  <!-- drifting triangles -->
  <polygon class="f2" points="1060,80 1080,112 1040,112" fill="none" stroke="rgba(0,0,0,0.28)" stroke-width="2.5"/>
  <polygon class="f4" points="300,200 316,228 284,228"   fill="rgba(0,0,0,0.18)"/>
  <polygon class="f1" points="900,540 912,562 888,562"   fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="2"/>
  <polygon class="f5" points="550,150 566,178 534,178"   fill="rgba(0,0,0,0.16)"/>

  <!-- dashed flowing lines -->
  <path class="dk"  d="M0,200 Q200,120 400,200 T800,200 T1200,200 T1600,200" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="1.8"/>
  <path class="dk2" d="M0,400 Q200,320 400,400 T800,400 T1200,400 T1600,400" fill="none" stroke="rgba(0,0,0,0.14)" stroke-width="1.5"/>
  <path class="dk"  d="M0,500 Q300,440 600,500 T1200,500 T1800,500"          fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.2"/>

  <!-- small dot grid cluster (static texture) -->
  <g opacity="0.20">
    <circle cx="1300" cy="150" r="3"/><circle cx="1320" cy="150" r="3"/><circle cx="1340" cy="150" r="3"/>
    <circle cx="1300" cy="170" r="3"/><circle cx="1320" cy="170" r="3"/><circle cx="1340" cy="170" r="3"/>
    <circle cx="1300" cy="190" r="3"/><circle cx="1320" cy="190" r="3"/><circle cx="1340" cy="190" r="3"/>
    <circle cx="60"   cy="380" r="3"/><circle cx="80"   cy="380" r="3"/><circle cx="100"  cy="380" r="3"/>
    <circle cx="60"   cy="400" r="3"/><circle cx="80"   cy="400" r="3"/><circle cx="100"  cy="400" r="3"/>
    <circle cx="60"   cy="420" r="3"/><circle cx="80"   cy="420" r="3"/><circle cx="100"  cy="420" r="3"/>
  </g>

  <!-- large hollow arc / bracket shapes -->
  <path class="d2" d="M1350,60 A120,120 0 0,1 1390,180" fill="none" stroke="rgba(0,0,0,0.22)" stroke-width="3" stroke-linecap="round"/>
  <path class="d1" d="M50,440 A100,100 0 0,0 10,540"    fill="none" stroke="rgba(0,0,0,0.20)" stroke-width="3" stroke-linecap="round"/>
</svg>